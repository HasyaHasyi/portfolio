<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasya's Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      font-family: 'Georgia', serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: wobble 2s ease-in-out infinite;
    }

    h1 {
      font-size: 1.8rem;
      color: #ffffff;
      font-weight: normal;
      line-height: 1.5;
    }

    h1 span {
      font-weight: bold;
      color: #e5ff00;
    }

    p {
      margin-top: 1rem;
      color: #888;
      font-size: 0.95rem;
      font-style: italic;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🚧</div>
    <h1>Sorry, <span>Hasya</span> is doing<br>something with this page.</h1>
    <p>Please check back later!</p>
  </div>
</body>
</html>
